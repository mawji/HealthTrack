# Build the HealthTrack production image (multi-arch) and publish it to GHCR.
#
# Belongs in / runs from the PUBLIC HealthTrack repo (that's the customer-facing
# source the deploy bundle pulls from). Triggers on a version tag like v1.2.3,
# and tags the image with the version + the moving `stable` channel that
# compose.yml/install.sh default to. Manual runs (workflow_dispatch) build a
# throwaway `:edge` tag for testing without cutting a release.
name: docker-publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/healthtrack
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
