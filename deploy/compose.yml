# HealthTrack — production stack (Tailscale-only, isolated). Prod-only; pulls a
# prebuilt image from GHCR. You edit .env, never this file. Bring up with:
#   docker compose up -d                      # core stack
#   docker compose --profile local-ai up -d   # also start local Ollama
#
# Topology: ts owns the tailnet identity + HTTPS; app/ollama/watchtower share its
# network namespace, so to each other they're localhost, and only the app is
# published to your tailnet (via serve.json). See docs/docker-deployment-runbook.html.
name: healthtrack

services:
  # Tailscale: claims a *.ts.net name and serves HTTPS → the app on 127.0.0.1:3210.
  ts:
    image: tailscale/tailscale:latest
    container_name: healthtrack-ts
    hostname: ${TS_HOSTNAME:-healthtrack}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?set TS_AUTHKEY in .env}
      TS_HOSTNAME: ${TS_HOSTNAME:-healthtrack}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ts-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    cap_add: [net_admin]
    restart: unless-stopped

  # The app: Next standalone server + scheduler + Telegram bridge (scripts/start.mjs).
  app:
    image: ghcr.io/${GHCR_OWNER:-mawji}/healthtrack:${CHANNEL:-stable}
    container_name: healthtrack-app
    network_mode: service:ts          # share the tailnet identity
    env_file: .env
    environment:
      PORT: "3210"
      HOSTNAME: "0.0.0.0"             # override Docker's auto HOSTNAME so Next binds correctly
    volumes:
      - ./data:/app/data
    depends_on: [ts]
    restart: unless-stopped
    labels:
      # Only this container is watched by Watchtower (scopes the update button to the app).
      com.centurylinklabs.watchtower.enable: "true"

  # Optional local models (background intelligence + offline coach). Opt in with
  # `--profile local-ai`. The app reaches it at http://localhost:11434.
  ollama:
    image: ollama/ollama:latest
    container_name: healthtrack-ollama
    network_mode: service:ts
    volumes:
      - ollama:/root/.ollama
    depends_on: [ts]
    restart: unless-stopped
    profiles: [local-ai]

  # On-demand updater. Holds the Docker socket; polling OFF — only acts when the
  # app POSTs /v1/update with the token. Watches labelled containers only.
  watchtower:
    image: containrrr/watchtower
    container_name: healthtrack-watchtower
    network_mode: service:ts
    command: --http-api-update --http-api-periodic-polls=false --label-enable
    environment:
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN:?set WATCHTOWER_TOKEN in .env}
      # containrrr/watchtower 1.7.1 ships an old Docker client (API 1.25); modern
      # daemons require >=1.40. Force a current version. (If this image breaks
      # further, the maintained fork ghcr.io/nicholas-fedor/watchtower is a drop-in.)
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [ts]
    restart: unless-stopped

volumes:
  ts-state:
  ollama:
